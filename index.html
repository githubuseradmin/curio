<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Curio — движок любопытства</title>
<meta name="description" content="Личный «движок любопытства»: короткие экспресс-карточки по многим темам — читай что-то новое каждый день.">
<meta name="theme-color" content="#0b0f17">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Curio">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Curio">
<meta property="og:title" content="Curio — движок любопытства">
<meta property="og:description" content="Короткие экспресс-карточки по многим темам — узнавай что-то новое каждый день.">
<meta property="og:image" content="https://githubuseradmin.github.io/curio/icons/icon-512.png">
<meta property="og:url" content="https://githubuseradmin.github.io/curio/">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Curio — движок любопытства">
<meta name="twitter:description" content="Короткие экспресс-карточки по многим темам — узнавай что-то новое каждый день.">
<meta name="twitter:image" content="https://githubuseradmin.github.io/curio/icons/icon-512.png">
<style>
  :root{
    --bg:#0b0f17; --bg2:#0f1420; --panel:#131a28; --panel2:#171f30; --panel3:#1c2438;
    --ink:#e8edf6; --muted:#93a0b8; --dim:#6b7890; --line:#222c40; --line2:#2c3850;
    --a1:#5eead4; --a2:#7c9cff; --a3:#f0abfc; --ok:#34d399; --warn:#fbbf24; --no:#f0637e;
    --r:16px; --maxw:760px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,system-ui,sans-serif;
    line-height:1.62; -webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(55vw 55vw at 90% -10%, rgba(124,156,255,.13), transparent 60%),
      radial-gradient(45vw 45vw at -5% 5%, rgba(94,234,212,.09), transparent 55%);
    background-attachment:fixed; padding-bottom:calc(72px + env(safe-area-inset-bottom, 0px));
  }
  a{color:var(--a2); text-decoration:none} a:hover{text-decoration:underline}
  button{font-family:inherit; cursor:pointer}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 clamp(14px,4vw,22px)}

  /* Header */
  header{position:sticky; top:0; z-index:20; backdrop-filter:blur(12px);
    background:linear-gradient(180deg,rgba(11,15,23,.92),rgba(11,15,23,.72)); border-bottom:1px solid var(--line);
    padding-top:env(safe-area-inset-top, 0px)}
  .wrap{padding-left:max(clamp(14px,4vw,22px), env(safe-area-inset-left, 0px)); padding-right:max(clamp(14px,4vw,22px), env(safe-area-inset-right, 0px))}
  .hbar{display:flex; align-items:center; gap:12px; padding:12px 0}
  .brand{display:flex; align-items:baseline; gap:10px; font-weight:800; letter-spacing:-.02em; font-size:22px;
    background:linear-gradient(120deg,#fff,var(--a1) 70%,var(--a2)); -webkit-background-clip:text; background-clip:text; color:transparent}
  .brand small{font-weight:500; font-size:12px; color:var(--muted); -webkit-text-fill-color:var(--muted)}
  .hstats{margin-left:auto; display:flex; gap:8px; align-items:center}
  .pill{display:inline-flex; align-items:center; gap:6px; font-size:13px; color:var(--muted);
    border:1px solid var(--line); background:rgba(255,255,255,.02); padding:5px 10px; border-radius:999px; white-space:nowrap}
  .pill b{color:#fff; font-weight:700}
  .icobtn{border:1px solid var(--line); background:rgba(255,255,255,.02); color:var(--muted);
    width:36px;height:34px;border-radius:10px; font-size:15px; transition:.15s}
  .icobtn:hover,.icobtn.on{color:#fff;border-color:var(--line2);background:var(--panel3)}

  /* Controls */
  .controls{padding:14px 0 6px; display:flex; flex-direction:column; gap:12px}
  .row{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
  .lbl{font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--dim)}
  .seg{display:inline-flex; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:3px}
  .seg button{border:0; background:transparent; color:var(--muted); padding:7px 14px; border-radius:9px; font-size:14px; font-weight:600; transition:.15s}
  .seg button.on{background:linear-gradient(180deg,var(--a2),#6685ff); color:#0a0e16; box-shadow:0 3px 12px rgba(124,156,255,.35)}
  .btn{border:1px solid var(--line2); background:var(--panel2); color:var(--ink); padding:8px 14px; border-radius:11px; font-weight:600; font-size:14px; transition:.15s}
  .btn:hover{border-color:var(--a2); transform:translateY(-1px)}
  .btn.surprise{background:linear-gradient(120deg,rgba(240,171,252,.16),rgba(124,156,255,.16)); border-color:rgba(240,171,252,.35)}

  /* Search */
  .searchbox{position:relative; flex:1 1 240px; min-width:200px}
  #search{width:100%; background:var(--panel); border:1px solid var(--line); color:var(--ink); font-size:14.5px;
    padding:9px 13px; border-radius:12px; outline:none; transition:.15s}
  #search:focus{border-color:var(--a2); background:var(--panel2)}
  #search::placeholder{color:var(--dim)}
  .searchres{position:absolute; top:calc(100% + 6px); left:0; right:0; z-index:30; display:none;
    background:#0c1220; border:1px solid var(--line2); border-radius:12px; overflow:hidden; box-shadow:0 16px 44px rgba(0,0,0,.55); max-height:320px; overflow-y:auto}
  .searchres.show{display:block}
  .sr{display:block; width:100%; text-align:left; border:0; border-bottom:1px solid var(--line); background:transparent; padding:10px 13px; transition:.12s}
  .sr:last-child{border-bottom:0} .sr:hover{background:var(--panel3)}
  .sr b{display:block; color:#fff; font-size:14px; font-weight:600}
  .sr i{display:block; color:var(--muted); font-size:12.5px; font-style:normal; margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .sr-empty{padding:12px 13px; color:var(--dim); font-size:13.5px}

  .chips{display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; -webkit-overflow-scrolling:touch; scrollbar-width:thin}
  .chips::-webkit-scrollbar{height:6px} .chips::-webkit-scrollbar-thumb{background:var(--line2); border-radius:6px}
  .fchip{flex:0 0 auto; border:1px solid var(--line); background:var(--panel); color:var(--muted);
    padding:6px 12px; border-radius:999px; font-size:13.5px; white-space:nowrap; transition:.15s}
  .fchip:hover{color:#fff; border-color:var(--line2)}
  .fchip.on{color:#0a0e16; background:var(--a1); border-color:var(--a1); font-weight:700}
  .sessinfo{font-size:12.5px; color:var(--dim); padding:2px 2px 0}

  /* Cards */
  .feed{display:flex; flex-direction:column; gap:16px; margin-top:10px}
  .cx{background:linear-gradient(180deg,var(--panel),var(--bg2)); border:1px solid var(--line); border-radius:var(--r);
    padding:18px; animation:rise .45s ease both; transition:border-color .18s, transform .2s, opacity .2s}
  .cx:hover{border-color:var(--line2)}
  .cx.removing{opacity:0; transform:translateX(-16px) scale(.98)}
  @keyframes rise{from{opacity:0; transform:translateY(12px)} to{opacity:1; transform:none}}
  .meta{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:10px}
  .dom{display:inline-flex; align-items:center; gap:6px; font-size:12.5px; color:#cbd5ea;
    background:rgba(124,156,255,.09); border:1px solid var(--line); padding:4px 10px; border-radius:999px; font-weight:600}
  .badge{font-size:11px; padding:3px 8px; border-radius:6px; font-weight:700; letter-spacing:.02em; text-transform:uppercase}
  .badge.new{background:linear-gradient(90deg,#5eead4,#7c9cff); color:#08120f}
  .lv-novice{background:rgba(52,211,153,.14); color:#5eead4} .lv-mid{background:rgba(124,156,255,.16); color:#a9bcff}
  .lv-deep{background:rgba(240,171,252,.15); color:#f0abfc}
  .fr-ever{background:rgba(148,160,184,.12); color:#93a0b8} .fr-fresh{background:rgba(251,191,36,.16); color:#fbbf24}
  .mins{font-size:12.5px; color:var(--dim); margin-left:auto}
  .cx h2{margin:2px 0 8px; font-size:clamp(18px,4.2vw,21px); line-height:1.25; letter-spacing:-.01em; color:#fff}
  .tldr{margin:0; color:#c4cde0; font-size:15.5px}
  .acts{display:flex; gap:8px; margin-top:14px; flex-wrap:wrap}
  .acts .btn{padding:7px 13px; font-size:13.5px}
  .primary{background:linear-gradient(120deg,var(--a1),#43cfc0); color:#08120f; border-color:transparent}
  .primary:hover{border-color:transparent; filter:brightness(1.06)}
  .ghost{background:transparent; border-color:var(--line)}
  .btn.no{background:transparent; border-color:var(--line); color:var(--muted)}
  .btn.no:hover{border-color:var(--no); color:#ffd0da; transform:translateY(-1px)}
  .star{background:transparent; border-color:var(--line); min-width:40px; text-align:center}
  .star.on{color:var(--warn); border-color:rgba(251,191,36,.4)}

  /* Body (expanded / focus) */
  .body{margin-top:14px; border-top:1px solid var(--line); padding-top:14px; animation:rise .35s ease both}
  .illus{margin:0 0 16px; border:1px solid var(--line); border-radius:14px; padding:10px;
    background:radial-gradient(130% 130% at 50% 0%, rgba(124,156,255,.07), transparent 68%), var(--bg2); overflow:hidden}
  .illus svg{display:block; width:100%; height:auto; max-height:230px}
  .body p{margin:0 0 12px; color:#d5ddec; font-size:15.5px}
  .body strong{color:#fff}
  .body code{background:#0a0e18; border:1px solid var(--line); padding:1px 6px; border-radius:6px; font-size:13.5px; color:var(--a1); font-family:ui-monospace,Menlo,Consolas,monospace}
  .body ul,.body ol{margin:0 0 12px; padding-left:20px; color:#d5ddec} .body li{margin:4px 0}
  .term{border-bottom:1.5px dotted var(--a2); color:#e9eefb; cursor:help}
  .term:hover{background:rgba(124,156,255,.12)}
  .gloss{margin:14px 0 2px}
  .gloss .gchip{display:inline-block; margin:6px 7px 0 0; border:1px solid var(--line); border-bottom:1.5px dotted var(--a2);
    padding:4px 10px; border-radius:9px; font-size:13px; background:var(--panel2)}
  .gloss .gchip:hover{border-color:var(--line2)}
  .holes{display:flex; flex-direction:column; gap:8px; margin:16px 0 4px}
  .holes .lbl2{font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); margin-bottom:2px}
  .hole{text-align:left; border:1px solid var(--line2); background:var(--panel2); border-radius:12px; padding:11px 13px; transition:.15s}
  .hole:hover{border-color:var(--a3); transform:translateX(3px); background:var(--panel3)}
  .hole b{color:#fff; font-size:14.5px} .hole span{display:block; color:var(--muted); font-size:13px; margin-top:2px}
  .hole b::before{content:"↳ "; color:var(--a3)}
  .test{margin:16px 0 4px; background:linear-gradient(90deg,rgba(94,234,212,.06),transparent); border-left:3px solid var(--a1);
    border-radius:0 10px 10px 0; padding:11px 14px; color:#d5ddec; font-size:14.5px}
  .test b{color:var(--a1); display:block; font-size:12px; letter-spacing:.08em; text-transform:uppercase; margin-bottom:3px}
  .src{margin-top:12px; font-size:12.5px; color:var(--dim); display:flex; gap:6px; flex-wrap:wrap; align-items:center}
  .src a{color:var(--muted); border:1px solid var(--line); padding:2px 8px; border-radius:6px}

  /* Empty / more */
  .more{display:flex; justify-content:center; margin:22px 0}
  .empty{text-align:center; padding:40px 16px; color:var(--muted)}
  .empty h3{color:#fff; font-size:20px; margin:0 0 8px}

  /* Focus overlay */
  .focus{position:fixed; inset:0; z-index:40; display:none; background:rgba(6,9,15,.72); backdrop-filter:blur(6px); overflow-y:auto}
  .focus.show{display:block; animation:fade .2s ease}
  @keyframes fade{from{opacity:0} to{opacity:1}}
  .fpanel{max-width:var(--maxw); margin:0 auto; min-height:100%; background:var(--bg2); border-left:1px solid var(--line); border-right:1px solid var(--line);
    padding:0 clamp(16px,4vw,26px) 40px}
  .fbar{position:sticky; top:0; background:linear-gradient(180deg,var(--bg2),rgba(15,20,32,.86)); backdrop-filter:blur(8px);
    padding:14px 0; padding-top:calc(14px + env(safe-area-inset-top, 0px)); display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--line); z-index:2}
  .crumbs{display:flex; gap:4px; align-items:center; overflow-x:auto; font-size:12.5px; color:var(--dim); flex:1; scrollbar-width:none}
  .crumbs::-webkit-scrollbar{display:none}
  .crumbs button{border:0; background:transparent; color:var(--muted); font-size:12.5px; padding:2px 4px; border-radius:6px; white-space:nowrap; max-width:180px; overflow:hidden; text-overflow:ellipsis}
  .crumbs button:last-child{color:#fff} .crumbs .sep{color:var(--dim)}
  .fclose{border:1px solid var(--line); background:var(--panel2); color:var(--muted); width:36px;height:34px;border-radius:10px; font-size:16px; flex:0 0 auto}
  .fclose:hover{color:#fff; border-color:var(--line2)}
  .fbody{padding-top:16px}
  .fbody .meta{margin-top:4px}
  .fbody h2{font-size:clamp(21px,5vw,26px); margin:8px 0 10px}

  /* Term popover */
  #pop{position:absolute; z-index:60; max-width:280px; display:none; background:#0c1220; border:1px solid var(--line2);
    border-radius:12px; padding:11px 13px; box-shadow:0 12px 40px rgba(0,0,0,.5); font-size:13.5px; color:#dbe3f2}
  #pop b{color:var(--a2); display:block; margin-bottom:3px; font-size:13px}
  #pop.show{display:block; animation:fade .12s ease}

  /* Help overlay */
  .help{position:fixed; inset:0; z-index:70; display:none; background:rgba(6,9,15,.72); backdrop-filter:blur(6px)}
  .help.show{display:flex; align-items:center; justify-content:center; animation:fade .16s ease; padding:20px}
  .help-card{background:var(--bg2); border:1px solid var(--line2); border-radius:18px; padding:24px; max-width:360px; width:100%}
  .help-card h3{margin:0 0 14px; color:#fff; font-size:18px}
  .kbrow{display:flex; align-items:center; gap:10px; margin:9px 0; color:var(--muted); font-size:14px}
  .kbrow span{flex:1}
  kbd{background:var(--panel3); border:1px solid var(--line2); border-bottom-width:2px; border-radius:6px; padding:2px 8px;
    font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12.5px; color:#e8edf6; min-width:24px; text-align:center; display:inline-block}
  .help-card .btn{width:100%; margin-top:14px; justify-content:center}

  .readmore{margin:16px 0 2px; display:flex; flex-direction:column; gap:8px}
  .rm{display:block; border:1px solid var(--line2); background:var(--panel2); border-radius:11px; padding:10px 13px; color:#dbe3f2; font-size:14px; transition:.15s}
  .rm:hover{border-color:var(--a2); transform:translateX(3px); text-decoration:none}
  .rm::before{content:"↗ "; color:var(--a2)}
  .rm.wiki::before{content:"📖 "} .rm.official::before{content:"🏛 "}

  .study-cta{background:linear-gradient(120deg,var(--a1),#43cfc0); color:#08120f; border-color:transparent; font-weight:700}
  .study-cta:hover{border-color:transparent; filter:brightness(1.06)}

  /* Study mode (лента изучения) */
  .study{position:fixed; top:0; left:0; right:0; bottom:calc(59px + env(safe-area-inset-bottom,0px)); z-index:15; display:none; background:var(--bg)}
  .study.show{display:flex; flex-direction:column}
  .study-bar{flex:0 0 auto; display:flex; align-items:center; gap:10px;
    padding:calc(10px + env(safe-area-inset-top,0px)) clamp(14px,4vw,20px) 8px;
    border-bottom:1px solid var(--line); background:rgba(11,15,23,.92); backdrop-filter:blur(10px)}
  .study-bar .st-title{flex:1; text-align:center; font-weight:700; color:#fff; font-size:15px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .study-chips{flex:0 0 auto; display:flex; gap:8px; overflow-x:auto; padding:9px clamp(14px,4vw,20px);
    border-bottom:1px solid var(--line); scrollbar-width:none}
  .study-chips::-webkit-scrollbar{display:none}
  .study-feed{flex:1 1 auto; overflow-y:scroll; scroll-snap-type:y mandatory; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; scrollbar-width:none; -ms-overflow-style:none}
  .study-feed::-webkit-scrollbar{display:none; width:0; height:0}
  .slide{scroll-snap-align:start; scroll-snap-stop:always; height:100%; overflow-y:auto; overscroll-behavior:contain; scrollbar-width:none; -ms-overflow-style:none; display:flex}
  .slide::-webkit-scrollbar{display:none; width:0}
  .slide-inner{max-width:640px; margin:0 auto; width:100%; min-height:100%; display:flex; flex-direction:column; justify-content:center; position:relative;
    padding:24px max(clamp(18px,6vw,30px), env(safe-area-inset-left,0px)) 40px max(clamp(18px,6vw,30px), env(safe-area-inset-right,0px))}
  .slide.open .slide-inner{justify-content:flex-start}
  .slide-hook{display:flex; flex-direction:column; align-items:flex-start; gap:14px; animation:rise .4s ease both}
  .slide-dom{font-size:12.5px}
  .slide-title{font-size:clamp(24px,6.6vw,36px); line-height:1.14; font-weight:800; letter-spacing:-.02em; color:#fff; margin:0}
  .slide-tldr{font-size:clamp(16px,4.3vw,20px); line-height:1.5; color:#c8d2e6; margin:0}
  .slide-illus{width:100%; border:1px solid var(--line); border-radius:16px; padding:10px; overflow:hidden;
    background:radial-gradient(130% 130% at 50% 0%, rgba(124,156,255,.09), transparent 66%), var(--bg2)}
  .slide-illus:empty{display:none}
  .slide-illus svg{width:100%; height:auto; max-height:min(38vh,260px); display:block}
  .slide-quick{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-top:4px; width:100%}
  .slide-expand{background:linear-gradient(120deg,var(--a1),#43cfc0); color:#08120f; border:0; border-radius:999px; padding:12px 22px; font-weight:800; font-size:15px; transition:.15s; cursor:pointer}
  .slide-expand:hover{filter:brightness(1.06); transform:translateY(-1px)}
  .slide-icons{display:flex; gap:9px; margin-left:auto}
  .rail-btn{width:44px; height:44px; border-radius:50%; border:1px solid var(--line2); background:rgba(19,26,40,.6); color:#dbe3f2; font-size:17px; transition:.15s; display:flex; align-items:center; justify-content:center}
  .rail-btn:hover{border-color:var(--a2); color:#fff; transform:translateY(-2px)}
  .rail-btn.on{color:var(--warn); border-color:rgba(251,191,36,.5)}
  .slide-more{display:none}
  .slide.open .slide-more{display:block; margin-top:20px; animation:rise .3s ease both}
  .slide-more .body{border-top:1px solid var(--line); margin-top:0; padding-top:16px}
  .slide-heart{position:absolute; left:50%; top:42%; transform:translate(-50%,-50%) scale(0); font-size:96px; color:#f0637e; pointer-events:none; opacity:0; z-index:3}
  .slide-heart.burst{animation:heartb .85s ease}
  @keyframes heartb{0%{transform:translate(-50%,-50%) scale(.2); opacity:0}18%{transform:translate(-50%,-50%) scale(1.05); opacity:.95}70%{opacity:.85}100%{transform:translate(-50%,-50%) scale(1.35); opacity:0}}
  #toast{position:fixed; left:50%; bottom:calc(26px + env(safe-area-inset-bottom,0px)); transform:translateX(-50%) translateY(8px); z-index:80;
    background:#0c1220; border:1px solid var(--line2); color:#e8edf6; padding:10px 16px; border-radius:12px; font-size:14px;
    box-shadow:0 10px 30px rgba(0,0,0,.5); opacity:0; pointer-events:none; transition:.2s}
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

  footer{max-width:var(--maxw); margin:30px auto 0; padding:16px 22px; color:var(--dim); font-size:12.5px;
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px; border-top:1px solid var(--line)}
  footer button{border:0;background:transparent;color:var(--dim);text-decoration:underline;font-size:12.5px}
  footer button:hover{color:var(--muted)}
  footer{display:none} /* заменено нижней навигацией */
  #bmBtn,#helpBtn{display:none} /* перенесено в Профиль/Настройки */
  .view{display:none} .view.active{display:block}
  .tabbar{position:fixed; left:0; right:0; bottom:0; z-index:35; display:flex;
    background:linear-gradient(0deg,rgba(11,15,23,.98),rgba(11,15,23,.9)); backdrop-filter:blur(12px); border-top:1px solid var(--line); padding-bottom:env(safe-area-inset-bottom,0px)}
  .tab{flex:1; border:0; background:transparent; color:var(--dim); display:flex; flex-direction:column; align-items:center; gap:3px; padding:9px 4px 8px; font-size:11px; cursor:pointer; transition:color .15s}
  .tab .ti{font-size:20px; line-height:1}
  .tab.on{color:#fff} .tab.on .ti{filter:drop-shadow(0 0 8px rgba(94,234,212,.55))}
  .pv,.sv{max-width:var(--maxw); margin:0 auto; padding:18px clamp(14px,4vw,22px) 20px}
  .pv h1,.sv h1{font-size:22px; color:#fff; margin:6px 0 4px}
  .pv .big{display:flex; gap:10px; margin:14px 0}
  .stat{flex:1; background:var(--panel2); border:1px solid var(--line); border-radius:14px; padding:14px 8px; text-align:center}
  .stat b{display:block; font-size:26px; color:#fff; line-height:1.1} .stat span{font-size:12px; color:var(--muted)}
  .pv h2,.sv h2{font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); margin:22px 0 10px}
  .prog{display:flex; align-items:center; gap:10px; margin:9px 0}
  .prog .pn{font-size:13px; color:#cbd5ea; width:150px; flex:0 0 auto; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .prog .pbar{flex:1; height:8px; background:var(--panel3); border-radius:6px; overflow:hidden}
  .prog .pfill{height:100%; background:linear-gradient(90deg,var(--a1),var(--a2)); border-radius:6px; transition:width .5s ease}
  .prog .pnum{font-size:12px; color:var(--dim); width:46px; text-align:right; flex:0 0 auto}
  .savedrow{display:block; width:100%; text-align:left; border:1px solid var(--line); background:var(--panel); border-radius:12px; padding:11px 13px; margin:8px 0; color:#dbe3f2; cursor:pointer}
  .savedrow:hover{border-color:var(--line2)} .savedrow b{color:#fff; font-size:14px; font-weight:600}
  .acctbox{background:var(--panel2); border:1px solid var(--line); border-radius:14px; padding:16px; color:var(--muted); font-size:14px; line-height:1.55}
  .srow{background:var(--panel2); border:1px solid var(--line); border-radius:14px; padding:14px 16px; margin:12px 0}
  .srow .sh{font-size:14px; color:#fff; font-weight:600; margin-bottom:10px}
  .srow .sd{font-size:13px; color:var(--muted); margin-top:8px; line-height:1.5}
  .srow .seg{display:inline-flex}
  .daily{display:flex; align-items:center; gap:14px; background:var(--panel2); border:1px solid var(--line); border-radius:16px; padding:14px 16px; margin:14px 0}
  .dring{width:60px; height:60px; border-radius:50%; flex:0 0 auto; display:flex; align-items:center; justify-content:center; position:relative}
  .dring::after{content:""; position:absolute; inset:6px; background:var(--panel2); border-radius:50%}
  .dring span{position:relative; z-index:1; font-size:13px; font-weight:800; color:#fff}
  .dtx .dh{font-size:15px; color:#fff; font-weight:700} .dtx .dsub{font-size:13px; color:var(--muted); margin-top:3px}
  .review-cta{width:100%; justify-content:center; margin:2px 0 6px; background:linear-gradient(120deg,rgba(240,171,252,.16),rgba(124,156,255,.16)); border-color:rgba(240,171,252,.35); font-weight:700}
  .review{position:fixed; inset:0; z-index:45; display:none; background:rgba(6,9,15,.9); backdrop-filter:blur(6px); overflow-y:auto}
  .review.show{display:block; animation:fade .2s ease}
  .rvpanel{max-width:var(--maxw); margin:0 auto; min-height:100%; background:var(--bg2); border-left:1px solid var(--line); border-right:1px solid var(--line); padding:0 clamp(16px,4vw,26px) 44px}
  .rvbar{position:sticky; top:0; background:var(--bg2); padding:calc(14px + env(safe-area-inset-top,0px)) 0 12px; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--line); z-index:2}
  .rvprog{flex:1; text-align:center; color:var(--muted); font-size:13px; font-weight:700}
  .rvbody{padding-top:20px}
  .rvcard h2{font-size:clamp(20px,5vw,26px); color:#fff; margin:8px 0 12px}
  .rvq{background:linear-gradient(90deg,rgba(94,234,212,.07),transparent); border-left:3px solid var(--a1); border-radius:0 10px 10px 0; padding:12px 14px; color:#d5ddec; font-size:15px}
  .rvq b{color:var(--a1); display:block; font-size:12px; text-transform:uppercase; letter-spacing:.08em; margin-bottom:4px}
  .rvacts{margin-top:18px} .rvacts .btn{width:100%; justify-content:center}
  .rvrate{display:flex; gap:10px; margin-top:18px} .rvrate .btn{flex:1; justify-content:center}
  .story-prog{height:3px; background:var(--line); overflow:hidden}
  .story-prog i{display:block; height:100%; width:100%; background:linear-gradient(90deg,var(--a1),var(--a2)); transform:scaleX(0); transform-origin:left}
  .story-prog.run i{animation:storyfill 9s linear forwards}
  @keyframes storyfill{from{transform:scaleX(0)}to{transform:scaleX(1)}}
  .study-bar #storyBtn.on{color:var(--a1); border-color:var(--a1)}
  .study-feed.story .slide-illus svg{animation:kenburns 9.5s ease both}
  @keyframes kenburns{from{transform:scale(1)}to{transform:scale(1.12)}}
  @media (max-width:520px){ .hstats .pill.learned{display:none} .mins{margin-left:0} }
</style>

<script src="cards.js"></script>
<script src="cards.en.js"></script>

<script>
(function(){
  "use strict";
  const CARDS = (window.CARDS||[]);
  const byId = Object.fromEntries(CARDS.map(c=>[c.id,c]));
  const DOMAINS = {
    math:{name:'Математика',emoji:'🧮'}, it:{name:'IT под капотом',emoji:'🖥️'},
    cyber:{name:'Кибербез',emoji:'🛡️'}, ai:{name:'ИИ изнутри',emoji:'🧠'},
    aviation:{name:'Авиация',emoji:'✈️'}, law:{name:'Право',emoji:'⚖️'},
    business:{name:'Бизнес',emoji:'📈'}, econ:{name:'Экономика',emoji:'💸'},
    english:{name:'English',emoji:'🌍'}, creative:{name:'Творчество',emoji:'🎧'}
  };
  const LVL = {'новичок':['lv-novice','новичок'],'интересно':['lv-mid','интересно'],'глубоко':['lv-deep','глубоко']};

  // ---------- state ----------
  const LSKEY='curio.v1';
  const def = {seen:{},known:{},saved:{},deep:{},skips:{},dislikes:{},streak:{count:0,last:null},pace:3,filter:'all',lang:'ru'};
  let state = load();
  function load(){ try{ const s=Object.assign({},def,JSON.parse(localStorage.getItem(LSKEY))||{}); s.dislikes=s.dislikes||{}; return s; }catch(e){ return Object.assign({},def); } }
  function save(){ try{ localStorage.setItem(LSKEY, JSON.stringify(state)); }catch(e){} }
  function today(){ const d=new Date(); return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }
  function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
  function plural(n,one,few,many){ n=Math.abs(n)%100; const d=n%10; if(n>10&&n<20)return many; if(d>1&&d<5)return few; if(d===1)return one; return many; }
  const UISTR={gloss:{ru:'Словарь',en:'Glossary'},deeper:{ru:'Провалиться глубже',en:'Go deeper'},test:{ru:'Проверь себя',en:'Test yourself'},sources:{ru:'Источники: ',en:'Sources: '},new:{ru:'новое',en:'new'},readmore:{ru:'Читать дальше ↗',en:'Read more ↗'}};
  function ui(k){ return (UISTR[k]||{})[state.lang==='en'?'en':'ru']||''; }
  function T(card){ if(state.lang==='en'){ const e=(window.CARDS_EN||{})[card.id]; if(e) return {title:e.title||card.title,tldr:e.tldr||card.tldr,body_md:e.body_md||card.body_md,terms:(e.terms&&e.terms.length)?e.terms:card.terms,test_yourself:e.test_yourself||card.test_yourself}; } return card; }

  function tickStreak(){
    const t=today(); const s=state.streak;
    if(s.last===t){} else if(s.last && daysBetween(s.last,t)===1){ s.count++; s.last=t; }
    else { s.count=1; s.last=t; }
    save();
  }

  // ---------- weighting ----------
  function weight(dom){ return Math.max(0.15, 1 + (state.deep[dom]||0)*1.5 - (state.skips[dom]||0)*0.4 - (state.dislikes[dom]||0)*1.2); }
  let viewSaved=false;
  function matches(c){ if(viewSaved) return !!state.saved[c.id]; return state.filter==='all'||c.domain===state.filter; }
  function ordered(){
    return CARDS.filter(c=> (viewSaved||!state.known[c.id]) && matches(c))
      .map(c=>({id:c.id, un:state.seen[c.id]?0:1, w:weight(c.domain)*(0.55+Math.random())}))
      .sort((a,b)=> (b.un-a.un)||(b.w-a.w)).map(x=>x.id);
  }

  // ---------- markdown ----------
  function esc(s){ return s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
  function inl(s){ return esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+?)`/g,'<code>$1</code>'); }
  function md(t){
    return (t||'').split(/\n\n+/).map(b=>{
      const lines=b.split('\n');
      if(lines.length>1 && lines.every(l=>/^\s*([-*]|\d+\.)\s+/.test(l))){
        const ol=/^\s*\d+\./.test(lines[0]);
        const items=lines.map(l=>'<li>'+inl(l.replace(/^\s*([-*]|\d+\.)\s+/,''))+'</li>').join('');
        return ol?'<ol>'+items+'</ol>':'<ul>'+items+'</ul>';
      }
      return '<p>'+inl(b).replace(/\n/g,'<br>')+'</p>';
    }).join('');
  }
  function annotate(el, terms){
    const done=[];
    (terms||[]).forEach(t=>{
      const w=document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null);
      let n;
      while((n=w.nextNode())){
        if(n.parentElement.closest('.term,code')) continue;
        const i=n.nodeValue.toLowerCase().indexOf(t.term.toLowerCase());
        if(i>=0){
          const mid=n.splitText(i); mid.splitText(t.term.length);
          const sp=document.createElement('span'); sp.className='term'; sp.textContent=mid.nodeValue;
          sp.dataset.explain=t.explain; mid.parentNode.replaceChild(sp, mid);
          done.push(t.term); break;
        }
      }
    });
    return done;
  }

  // ---------- render a full body (used inline & in focus) ----------
  function bodyHTML(card, onHole, skipIllus){
    const box=document.createElement('div'); box.className='body';
    const illu=(window.ILLUS||{})[card.id];
    if(illu && !skipIllus){ const fig=document.createElement('figure'); fig.className='illus'; fig.innerHTML=illu; box.appendChild(fig); }
    const v=T(card);
    const txt=document.createElement('div'); txt.innerHTML=md(v.body_md);
    const matched=annotate(txt, v.terms); box.appendChild(txt);
    const leftover=(v.terms||[]).filter(t=>matched.indexOf(t.term)<0);
    if(leftover.length){
      const g=document.createElement('div'); g.className='gloss';
      g.innerHTML='<div class="lbl2">'+ui('gloss')+'</div>';
      leftover.forEach(t=>{ const s=document.createElement('span'); s.className='term gchip'; s.textContent=t.term; s.dataset.explain=t.explain; g.appendChild(s); });
      box.appendChild(g);
    }
    const holes=(card.rabbit_holes||[]).filter(h=>h.to_id && byId[h.to_id]);
    if(holes.length){
      const wrap=document.createElement('div'); wrap.className='holes';
      wrap.innerHTML='<div class="lbl2">'+ui('deeper')+'</div>';
      holes.forEach(h=>{
        const b=document.createElement('button'); b.className='hole';
        b.innerHTML='<b></b><span></span>'; b.querySelector('b').textContent=h.label; b.querySelector('span').textContent=h.teaser;
        b.onclick=()=> (onHole||openFocus)(h.to_id);
        wrap.appendChild(b);
      });
      box.appendChild(wrap);
    }
    if(v.test_yourself){
      const t=document.createElement('div'); t.className='test';
      const bb=document.createElement('b'); bb.textContent=ui('test'); t.appendChild(bb); t.appendChild(document.createTextNode(v.test_yourself));
      box.appendChild(t);
    }
    if(card.sources && card.sources.length){
      const s=document.createElement('div'); s.className='src'; s.appendChild(document.createTextNode(ui('sources')));
      card.sources.forEach(src=>{ if(src.url){ const a=document.createElement('a'); a.href=src.url; a.target='_blank'; a.rel='noopener'; a.textContent=src.label||src.url; s.appendChild(a);} else { const sp=document.createElement('span'); sp.textContent=src.label; s.appendChild(sp);} });
      box.appendChild(s);
    }
    if(card.read_more && card.read_more.length){
      const rm=document.createElement('div'); rm.className='readmore';
      const hd=document.createElement('div'); hd.className='lbl2'; hd.textContent=ui('readmore'); rm.appendChild(hd);
      card.read_more.forEach(l=>{ if(!l.url)return; const a=document.createElement('a'); a.className='rm '+(l.kind||''); a.href=l.url; a.target='_blank'; a.rel='noopener'; a.textContent=l.label||l.url; rm.appendChild(a); });
      box.appendChild(rm);
    }
    return box;
  }

  // ---------- meta / card ----------
  function metaHTML(card){
    const d=DOMAINS[card.domain]||{name:card.domain,emoji:'•'};
    const lv=LVL[card.level]||['lv-mid',card.level];
    const fr=card.freshness==='свежак'?['fr-fresh','свежак']:['fr-ever','вечнозелёное'];
    return '<div class="meta"><span class="dom">'+d.emoji+' '+d.name+'</span>'
      +'<span class="badge '+lv[0]+'">'+lv[1]+'</span>'
      +'<span class="badge '+fr[0]+'">'+fr[1]+'</span>'
      +'<span class="mins">⏱ '+(card.minutes||5)+' мин</span></div>';
  }
  function cardEl(card){
    const el=document.createElement('article'); el.className='cx'; el.dataset.id=card.id;
    el.innerHTML=metaHTML(card)
      +'<h2></h2><p class="tldr"></p>'
      +'<div class="acts">'
      +'<button class="btn primary" data-a="open">Читать →</button>'
      +'<button class="btn ghost" data-a="know">Знаю ✓</button>'
      +'<button class="btn no" data-a="no" title="Не интересно">Не моё</button>'
      +'<button class="btn star" data-a="save" title="В закладки">'+(state.saved[card.id]?'★':'☆')+'</button>'
      +'</div>';
    const v=T(card);
    el.querySelector('h2').textContent=v.title;
    el.querySelector('.tldr').textContent=v.tldr;
    if(!state.seen[card.id]){ const nb=document.createElement('span'); nb.className='badge new'; nb.textContent=ui('new'); const m=el.querySelector('.meta'); m.insertBefore(nb, m.firstChild); }
    el.querySelector('[data-a="open"]').onclick=(e)=>toggleOpen(el,card,e.currentTarget);
    el.querySelector('[data-a="know"]').onclick=()=>skipCard(card,el,'know');
    el.querySelector('[data-a="no"]').onclick=()=>skipCard(card,el,'no');
    el.querySelector('[data-a="save"]').onclick=(e)=>toggleSave(card,e.currentTarget);
    return el;
  }
  function toggleOpen(el,card,btn){
    const ex=el.querySelector('.body');
    if(ex){ ex.remove(); btn.textContent='Читать →'; return; }
    el.appendChild(bodyHTML(card,openFocus)); btn.textContent='Свернуть ↑';
    if(!state.seen[card.id]){ markSeen(card.id); const nb=el.querySelector('.badge.new'); if(nb) nb.remove(); }
  }
  function toggleSave(card,btn){ state.saved[card.id]=!state.saved[card.id]; btn.textContent=state.saved[card.id]?'★':'☆'; btn.classList.toggle('on',!!state.saved[card.id]); save(); }
  function skipCard(card,el,kind){
    state.known[card.id]=true; state.seen[card.id]=true;
    if(kind==='no') state.dislikes[card.domain]=(state.dislikes[card.domain]||0)+1;
    else state.skips[card.domain]=(state.skips[card.domain]||0)+1;
    save(); renderStats();
    if(el){ el.classList.add('removing'); setTimeout(()=>{ feedOrder=feedOrder.filter(x=>x!==card.id); renderFeed(); },220); }
  }

  // ---------- rabbit-hole focus (with history) ----------
  const focus=document.getElementById('focus'), fbody=document.getElementById('fbody'), crumbs=document.getElementById('crumbs');
  let trail=[];
  function showFocus(){ focus.classList.add('show'); document.body.style.overflow='hidden'; }
  function hideFocus(){ focus.classList.remove('show'); document.body.style.overflow=''; trail=[]; }
  function urlFor(id){ return location.pathname+location.search+'#'+id; }
  function openFocus(id){ if(!byId[id])return; trail=[id]; renderFocus(); showFocus();
    if(history.state&&history.state.curioFocus) history.replaceState({curioFocus:true},'',urlFor(id));
    else history.pushState({curioFocus:true},'',urlFor(id)); }
  function dive(id){ if(!byId[id])return; trail.push(id); renderFocus(); history.replaceState({curioFocus:true},'',urlFor(id)); }
  function fullClose(){ if(history.state&&history.state.curioFocus) history.back(); else { hideFocus(); clearHash(); } }
  function requestClose(){ if(trail.length>1){ trail.pop(); renderFocus(); history.replaceState({curioFocus:true},'',urlFor(trail[trail.length-1])); } else fullClose(); }
  function clearHash(){ if(location.hash) history.replaceState(null,'',location.pathname+location.search); }
  function renderFocus(){
    const id=trail[trail.length-1], card=byId[id]; if(!card) return;
    if(!state.seen[id]) markSeen(id);
    state.deep[card.domain]=(state.deep[card.domain]||0)+1; save(); renderStats();
    fbody.innerHTML=metaHTML(card)+'<h2></h2>';
    fbody.querySelector('h2').textContent=T(card).title;
    const acts=document.createElement('div'); acts.className='acts';
    acts.innerHTML='<button class="btn ghost" data-a="know">Знаю ✓</button>'
      +'<button class="btn no" data-a="no">Не моё</button>'
      +'<button class="btn star" data-a="save">'+(state.saved[id]?'★':'☆')+'</button>';
    acts.querySelector('[data-a="know"]').onclick=()=>{ skipCard(card,null,'know'); fullClose(); };
    acts.querySelector('[data-a="no"]').onclick=()=>{ skipCard(card,null,'no'); fullClose(); };
    acts.querySelector('[data-a="save"]').onclick=(e)=>toggleSave(card,e.currentTarget);
    fbody.appendChild(acts);
    fbody.appendChild(bodyHTML(card,dive));
    crumbs.innerHTML='';
    trail.forEach((tid,i)=>{

  function stripSpeech(t){ return (t||'').replace(/\*\*(.+?)\*\*/g,'$1').replace(/`([^`]+?)`/g,'$1').replace(/\s*\n+\s*/g,'. ').replace(/\s+/g,' ').trim(); }

    if(saved.length){ saved.forEach(c=>{ h+='<button class="savedrow" data-id="'+c.id+'"><b></b></button>'; }); }
    else h+='<div class="acctbox">'+(en?'Nothing saved yet — tap ★ on a card.':'Пока пусто — жми ★ на карточке (или двойной тап в режиме изучения).')+'</div>';
    h+='<h2>'+(en?'Account':'Аккаунт')+'</h2><div class="acctbox">'+(en?'User accounts are coming — sync across devices, personal feed. For now progress lives on this device.':'Система пользователей — скоро: синхронизация между устройствами, личная лента. Сейчас прогресс хранится на этом устройстве.')+'<br><button class="btn" disabled style="opacity:.55;margin-top:12px">'+(en?'Sign in (soon)':'Войти (скоро)')+'</button></div>';
    el.innerHTML=h;
    { const rc=el.querySelector('#reviewCta'); if(rc) rc.onclick=openReview; }
    saved.forEach(c=>{ const r=el.querySelector('.savedrow[data-id="'+c.id+'"]'); if(r){ r.querySelector('b').textContent=(DOMAINS[c.domain]||{}).emoji+' '+T(c).title; r.onclick=()=>openFocus(c.id); } });
  }

  // ---------- settings ----------
  function renderSettings(){
    const el=document.getElementById('settingsBody'); if(!el) return; const en=state.lang==='en';
    el.innerHTML='<h1>'+(en?'Settings':'Настройки')+'</h1>'
      +'<div class="srow"><div class="sh">'+(en?'Language':'Язык')+'</div><div class="seg" id="langSeg"><button data-l="ru"'+(state.lang!=='en'?' class="on"':'')+'>Русский</button><button data-l="en"'+(state.lang==='en'?' class="on"':'')+'>English</button></div><div class="sd">'+(en?'Card language. Where a translation is missing, Russian is shown.':'Язык карточек. Где нет перевода — покажется русский.')+'</div></div>'
      +'<div class="srow"><div class="sh">'+(en?'Progress':'Прогресс')+'</div><button class="btn" id="setReset">'+(en?'Reset progress':'Сбросить прогресс')+'</button><div class="sd">'+(en?'Clears learned, saved and streak on this device.':'Очистит изученное, закладки и стрик на этом устройстве.')+'</div></div>'
      +'<div class="srow"><div class="sh">'+(en?'Keyboard':'Горячие клавиши')+'</div><div class="sd"><kbd>/</kbd> '+(en?'search':'поиск')+' · <kbd>R</kbd> '+(en?'random':'рандом')+' · <kbd>&larr;</kbd> '+(en?'back':'назад')+' · <kbd>Esc</kbd> '+(en?'close':'закрыть')+'</div></div>'
      +'<div class="srow"><div class="sh">'+(en?'About':'О проекте')+'</div><div class="sd">Curio — '+(en?'a curiosity engine: swipe and learn something new.':'движок любопытства: листай и узнавай новое.')+'<br>'+CARDS.length+(en?' cards · project ':' карточек · проект ')+'🌙 MoonCap</div></div>';
    const seg=el.querySelector('#langSeg');
    if(seg) seg.addEventListener('click',e=>{ const b=e.target.closest('button[data-l]'); if(!b) return; const cur=state.lang==='en'?'en':'ru'; if(b.dataset.l!==cur){ state.lang=b.dataset.l; save(); syncLang(); rebuild(); renderSettings(); } });
    const rb=el.querySelector('#setReset');
    if(rb) rb.onclick=()=>{ if(confirm(en?'Reset all progress?':'Сбросить весь прогресс?')){ const lang=state.lang, streak=state.streak; state=Object.assign({},def,{seen:{},known:{},saved:{},deep:{},skips:{},dislikes:{},streak:streak,lang:lang}); save(); rebuild(); renderStats(); renderSettings(); } };
  }

  // ---------- story (авто-режим, «наше видео») ----------
  let storyOn=false, storyT=null;
  function storyStop(){ storyOn=false; if(storyT){ clearTimeout(storyT); storyT=null; } if(typeof studyFeed!=='undefined'&&studyFeed) studyFeed.classList.remove('story'); const sb=document.getElementById('storyBtn'); if(sb){ sb.classList.remove('on'); sb.textContent='▶'; } const p=document.getElementById('storyProg'); if(p) p.classList.remove('run'); }
  function storyTick(){ if(!storyOn) return; const cur=studyCurrent(); if(!cur){ storyStop(); return; } fillSlide(cur);
    const p=document.getElementById('storyProg'); if(p){ p.classList.remove('run'); void p.offsetWidth; p.classList.add('run'); }
    storyT=setTimeout(function(){ if(!storyOn) return; const nx=cur.nextElementSibling; if(nx){ nx.scrollIntoView({behavior:'smooth',block:'start'}); setTimeout(storyTick,650); } else { storyStop(); } }, 9000); }
  { const sb=document.getElementById('storyBtn'); if(sb) sb.onclick=function(){ if(storyOn){ storyStop(); } else { storyOn=true; studyFeed.classList.add('story'); sb.classList.add('on'); sb.textContent='⏸'; storyTick(); } }; }

  // ---------- pace / bookmarks / help / reset ----------
  document.getElementById('pace').addEventListener('click',e=>{
    const btn=e.target.closest('button[data-p]'); if(!btn) return;
    [...e.currentTarget.children].forEach(c=>c.classList.remove('on')); btn.classList.add('on');
    const p=btn.dataset.p; state.pace=(p==='all')?'all':parseInt(p,10); save(); rebuild();
  });
  const bmBtn=document.getElementById('bmBtn');
  function syncBm(){ bmBtn.classList.toggle('on',viewSaved); }
  bmBtn.onclick=()=>{ viewSaved=!viewSaved; syncBm(); renderFilters(); rebuild(); };
  const langBtn=document.getElementById('langBtn');
  function syncLang(){ langBtn.textContent = state.lang==='en'?'RU':'EN'; langBtn.classList.toggle('on', state.lang==='en'); }
  langBtn.onclick=()=>{ state.lang = state.lang==='en'?'ru':'en'; save(); syncLang(); rebuild(); if(focus.classList.contains('show')) renderFocus(); if(studyEl.classList.contains('show')){ buildStudyChips(); renderStudy(); } };
  const help=document.getElementById('help');
  document.getElementById('helpBtn').onclick=()=>help.classList.add('show');
  document.getElementById('helpClose').onclick=()=>help.classList.remove('show');
  help.addEventListener('click',e=>{ if(e.target===help) help.classList.remove('show'); });
  document.getElementById('reset').onclick=()=>{
    if(confirm('Сбросить весь прогресс (изученное, закладки, стрик)?')){ state=Object.assign({},def,{streak:state.streak,dislikes:{},skips:{},deep:{},seen:{},known:{},saved:{}}); save(); viewSaved=false; syncBm(); renderFilters(); rebuild(); renderStats(); }
  };

  // ---------- keyboard ----------
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){
      var rvEl=document.getElementById('review'); if(rvEl&&rvEl.classList.contains('show')){ closeReview(); return; }
      if(help.classList.contains('show')){ help.classList.remove('show'); return; }
      if(searchRes.classList.contains('show')){ searchRes.classList.remove('show'); search.blur(); return; }
      if(studyEl.classList.contains('show')){ switchTab('feed'); return; }
      if(focus.classList.contains('show')){ requestClose(); return; }
      pop.classList.remove('show'); return;
    }
    const typing = /^(INPUT|TEXTAREA)$/.test((document.activeElement||{}).tagName||'');
    if(focus.classList.contains('show') && (e.key==='Backspace'||e.key==='ArrowLeft') && !typing){ e.preventDefault(); requestClose(); return; }
    if(typing || help.classList.contains('show') || studyEl.classList.contains('show')) return;
    if(e.key==='/'){ e.preventDefault(); search.focus(); return; }
    if(e.key==='?'){ e.preventDefault(); help.classList.add('show'); return; }
    if(e.key==='r'||e.key==='R'||e.key==='к'||e.key==='К'){ doSurprise(); return; }
  });

  // ---------- init ----------
  [...document.querySelectorAll('#pace button')].forEach(b=>b.classList.toggle('on', (b.dataset.p==='all'?'all':parseInt(b.dataset.p,10))===state.pace));
  tickStreak(); renderStats(); syncLang(); renderFilters(); rebuild();
  const h0=decodeURIComponent(location.hash.slice(1));
  if(h0 && byId[h0]){ trail=[h0]; renderFocus(); showFocus(); history.replaceState({curioFocus:true},'',urlFor(h0)); }
})();
</script>
<script>if('serviceWorker' in navigator && location.protocol!=='file:'){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}</script>
</body>
